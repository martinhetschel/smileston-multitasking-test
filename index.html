<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://martinhetschel.github.io/smilestone-flowshift/">
    <link rel="canonical" href="https://martinhetschel.github.io/smilestone-flowshift/">
    <title>Umgezogen zu Smilestone FlowShift</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #2D2D2D;
            color: #fff;
            text-align: center;
        }
        a { color: #FFB700; }
    </style>
</head>
<body>
    <div>
        <p>Diese App ist umgezogen (Tippfehler im alten Namen behoben).</p>
        <p>
            <a href="https://martinhetschel.github.io/smilestone-flowshift/">
                Weiter zu Smilestone FlowShift &ndash; The Lean Excellence Simulation
            </a>
        </p>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
        }
        if (window.caches) {
            caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        }
        location.replace('https://martinhetschel.github.io/smilestone-flowshift/');
    </script>
</body>
</html>
